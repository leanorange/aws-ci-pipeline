version: 0.2

env:
  parameter-store:
    DOCKER_USERNAME: /myapp/docker/username
    DOCKER_REGISTRY: /myapp/docker/registry_url
  secrets-manager:
    DOCKER_PASSWORD: myapp/docker/password

phases:
  pre_build:
    commands:
      # Confirm variable lengths (values stay masked)
      - echo "Username length=${#DOCKER_USERNAME}"
      - echo "Password length=${#DOCKER_PASSWORD}"

      # Strip any invisible whitespace/newlines that survive copy-paste
      - DOCKER_USERNAME=$(echo -n "$DOCKER_USERNAME" | tr -d '[:space:]')
      - DOCKER_PASSWORD=$(echo -n "$DOCKER_PASSWORD" | tr -d '[:space:]')

      # Confirm lengths again after stripping — if they changed, you had junk chars
      - echo "Username length after strip=${#DOCKER_USERNAME}"
      - echo "Password length after strip=${#DOCKER_PASSWORD}"

      - printf '%s' "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t myapp:latest .
      - docker tag myapp:latest "$DOCKER_USERNAME/myapp:latest"

  post_build:
    commands:
      - echo "Pushing image to Docker Hub..."
      - docker push "$DOCKER_USERNAME/myapp:latest"
      - echo "Build complete!"
